name: 💤 미접속 알림

on:
  schedule:
    # 매일 오전 7시 KST = UTC 22시 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  inactive-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: 💤 미접속 감지
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GUILD_NAME: 거울
        run: npx tsx scripts/batch-inactive.ts
