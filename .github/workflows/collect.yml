name: 🍄 일일 데이터 수집

on:
  schedule:
    # 매일 오전 6시 (KST) = UTC 21:00 (전날)
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: 🍄 데이터 수집
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
          GUILD_NAME: 거울
          WORLD_NAME: 스카니아
        run: npx tsx scripts/collect.ts

      - name: 📁 수집 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🍄 데이터 수집: $(date +%Y-%m-%d)"
          git push
