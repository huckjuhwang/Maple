name: 🍄 일일 데이터 수집

on:
  schedule:
    # KST 01:00 = UTC 16:00 (KST는 UTC+9, 즉 UTC = KST - 9시간)
    - cron: '0 16 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: 🍄 데이터 수집 (어제 스냅샷 + latest.json 업데이트)
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
          GUILD_NAME: 거울
          WORLD_NAME: 스카니아
        run: npx tsx scripts/collect.ts

      - name: 📁 수집 결과 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git diff --staged --quiet || git commit -m "🍄 데이터 수집: $(date +%Y-%m-%d)"
          git push
