name: 🍄 전날 결산 수집 (매일 KST 00:05, 실패 시 30분 재시도)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: 🍄 전날 최종 데이터 수집
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
          GUILD_NAME: 거울
          WORLD_NAME: 스카니아
        run: npx tsx scripts/collect.ts

      - name: 📁 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git diff --staged --quiet || git commit -m "🍄 전날 결산: $(date +%Y-%m-%d) [skip vercel]"
          git pull --rebase origin main
          git push
