name: 🍄 오늘 실시간 수집 (매시간)

on:
  schedule:
    # 매 30분마다
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-today:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: 🍄 오늘 실시간 데이터 수집
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
        run: npx tsx scripts/collect-today.ts

      - name: 📁 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git diff --staged --quiet || git commit -m "🍄 오늘 수집: $(date +%Y-%m-%d %H:%M)"
          git push
