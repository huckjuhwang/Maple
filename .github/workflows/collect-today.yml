name: 🍄 오늘 실시간 수집 (3시/9시/15시/21시)

on:
  schedule:
    # KST 03:00 = UTC 18:00 (전날)
    - cron: '0 18 * * *'
    # KST 09:00 = UTC 00:00
    - cron: '0 0 * * *'
    # KST 15:00 = UTC 06:00
    - cron: '0 6 * * *'
    # KST 21:00 = UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  collect-today:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: 🍄 오늘 실시간 데이터 수집
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
        run: npx tsx scripts/collect-today.ts

      - name: 📁 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/
          git diff --staged --quiet || git commit -m "🍄 오늘 수집: $(date +%Y-%m-%d %H:%M)"
          git push
