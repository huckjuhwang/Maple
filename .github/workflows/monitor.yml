name: 🔍 길드원 모니터링

on:
  schedule:
    # 배치 1: 가입/탈퇴 감지 (5분마다)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  member-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: 🔍 가입/탈퇴 감지
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GUILD_NAME: 거울
          WORLD_NAME: 스카니아
        run: npx tsx scripts/batch-member-change.ts
      - name: 📁 상태 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🔍 길드원 변동 감지: $(date +%Y-%m-%d_%H:%M)"
          git push
