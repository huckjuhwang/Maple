name: 🔍 길드원 모니터링 (매 5분)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  member-change:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: 🔍 가입/탈퇴 감지 (거울)
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GUILD_NAME: 거울
          WORLD_NAME: 스카니아
        run: npx tsx scripts/batch-member-change.ts
      - name: 🔍 가입/탈퇴 감지 (달라)
        env:
          NEXON_API_KEY: ${{ secrets.NEXON_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GUILD_NAME: 달라
          WORLD_NAME: 스카니아
        run: npx tsx scripts/batch-member-change.ts
      - name: 📁 상태 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🔍 길드원 변동 감지: $(date +%Y-%m-%d_%H:%M) [skip vercel]"
          git pull --rebase -X ours origin main || (git rebase --abort && git pull origin main && git push && exit 0)
          git push
